name: "Akari Command Executor"

on:
  repository_dispatch:
    types: [akari-command]

permissions:
  issues: write
  discussions: write
  contents: write

jobs:
  execute:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Execute command via gateway (with retry)
        id: run
        env:
          AKARI_USER: ${{ github.event.client_payload.user }}
          AKARI_COMMAND: ${{ github.event.client_payload.command }}
        run: |
          MAX_RETRIES=3
          RETRY_DELAY=15
          ATTEMPT=0
          EXIT_CODE=1

          echo "Command: $AKARI_COMMAND"
          echo "User: $AKARI_USER"

          while [ $ATTEMPT -lt $MAX_RETRIES ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "=== Attempt $ATTEMPT / $MAX_RETRIES ==="

            set +e
            RESULT=$(python -m runner.gateway \
              --source github \
              --user "$AKARI_USER" \
              --message "$AKARI_COMMAND" \
              2>&1)
            EXIT_CODE=$?
            set -e

            if [ $EXIT_CODE -eq 0 ]; then
              break
            fi

            if echo "$RESULT" | grep -qi "no clients available\|503\|502\|rate.limit"; then
              echo "API gateway busy, retrying in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
              RETRY_DELAY=$((RETRY_DELAY * 2))
            else
              break
            fi
          done

          echo "$RESULT" > /tmp/akari-result.txt

          if [ $EXIT_CODE -ne 0 ]; then
            echo "success=false" >> "$GITHUB_OUTPUT"
          else
            echo "success=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Post result to issue
        if: github.event.client_payload.context_type == 'issue'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const result = fs.readFileSync('/tmp/akari-result.txt', 'utf8').trim();
            const success = '${{ steps.run.outputs.success }}' === 'true';
            const icon = success ? '✅' : '❌';
            const user = '${{ github.event.client_payload.user }}';
            const command = `${{ github.event.client_payload.command }}`.substring(0, 200);

            const body = [
              `${icon} **Akari** — @${user}`,
              '',
              `> ${command}`,
              '',
              result.substring(0, 3800),
              '',
              result.length > 3800 ? '\n---\n_结果过长，已截断。完整日志见 [Actions run](' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions)。_' : '',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ github.event.client_payload.context_number }}'),
              body: body,
            });

      - name: Post result to discussion
        if: github.event.client_payload.context_type == 'discussion'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const result = fs.readFileSync('/tmp/akari-result.txt', 'utf8').trim();
            const success = '${{ steps.run.outputs.success }}' === 'true';
            const icon = success ? '✅' : '❌';
            const user = '${{ github.event.client_payload.user }}';
            const command = `${{ github.event.client_payload.command }}`.substring(0, 200);

            const body = [
              `${icon} **Akari** — @${user}`,
              '',
              `> ${command}`,
              '',
              result.substring(0, 3800),
              '',
              result.length > 3800 ? '\n---\n_结果过长，已截断。_' : '',
            ].join('\n');

            const discussionNumber = Number('${{ github.event.client_payload.context_number }}');

            // GraphQL is needed to comment on discussions
            const query = `
              query($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  discussion(number: $number) { id }
                }
              }`;
            const variables = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              number: discussionNumber,
            };
            const resp = await github.graphql(query, variables);
            const discussionId = resp.repository.discussion.id;

            const mutation = `
              mutation($discussionId: ID!, $body: String!) {
                addDiscussionComment(input: {discussionId: $discussionId, body: $body}) {
                  comment { id }
                }
              }`;
            await github.graphql(mutation, { discussionId, body });

      - name: React with result status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const commentId = Number('${{ github.event.client_payload.comment_id }}');
            const success = '${{ steps.run.outputs.success }}' === 'true';
            try {
              await github.rest.reactions.createForIssueComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: commentId,
                content: success ? 'rocket' : 'confused',
              });
            } catch (e) {
              console.log('Could not add reaction:', e.message);
            }
