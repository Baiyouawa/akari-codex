name: "Akari Command Listener"

on:
  issue_comment:
    types: [created]
  discussion_comment:
    types: [created]

permissions:
  issues: write
  discussions: write
  contents: write

jobs:
  dispatch:
    runs-on: ubuntu-latest
    if: >-
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association) &&
      !startsWith(github.event.comment.body, '✅') &&
      !startsWith(github.event.comment.body, '❌') &&
      github.event.comment.user.login != 'github-actions[bot]'
    steps:
      - name: React to acknowledge
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes'
            });

      - name: Dispatch execution
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.comment.body || '';
            const user = context.payload.comment.user.login;
            const isIssue = context.eventName === 'issue_comment';
            const number = isIssue
              ? context.payload.issue.number
              : context.payload.discussion.number;

            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: 'akari-command',
              client_payload: {
                command: body.trim(),
                user: user,
                context_type: isIssue ? 'issue' : 'discussion',
                context_number: String(number),
                comment_id: String(context.payload.comment.id),
              },
            });
