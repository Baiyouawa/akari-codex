name: "Akari Command Listener"

on:
  issue_comment:
    types: [created]
  discussion_comment:
    types: [created]

permissions:
  issues: write
  discussions: write
  contents: write

jobs:
  dispatch:
    runs-on: ubuntu-latest
    if: >-
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association) &&
      !startsWith(github.event.comment.body, '✅') &&
      !startsWith(github.event.comment.body, '❌') &&
      github.event.comment.user.login != 'github-actions[bot]'
    steps:
      - name: Extract command
        id: parse
        run: |
          BODY=$(cat <<'ENDOFBODY'
          ${{ github.event.comment.body }}
          ENDOFBODY
          )

          # Strip common prefixes (case-insensitive): /akari, /Akari, @akari, akari:, 阿卡丽 etc.
          COMMAND=$(echo "$BODY" | sed -E 's|^[/@]?[Aa][Kk][Aa][Rr][Ii][: ]*||; s|^阿卡丽[: ，,]*||' | xargs)

          # If prefix stripping removed nothing, use original body as-is
          if [ -z "$COMMAND" ]; then
            COMMAND="$BODY"
          fi

          # Write to file to avoid escaping issues
          echo "$COMMAND" > /tmp/akari-command.txt
          echo "user=${{ github.event.comment.user.login }}" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            echo "context_type=issue" >> "$GITHUB_OUTPUT"
            echo "context_number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "context_type=discussion" >> "$GITHUB_OUTPUT"
            echo "context_number=${{ github.event.discussion.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: React to acknowledge
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes'
            });

      - name: Dispatch execution
        uses: peter-evans/repository-dispatch@v3
        with:
          event-type: akari-command
          client-payload: >-
            {
              "command_file": "/tmp/akari-command.txt",
              "command": "${{ github.event.comment.body }}",
              "user": "${{ steps.parse.outputs.user }}",
              "context_type": "${{ steps.parse.outputs.context_type }}",
              "context_number": "${{ steps.parse.outputs.context_number }}",
              "comment_id": "${{ github.event.comment.id }}"
            }
