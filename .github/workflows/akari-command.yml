name: "Akari Command Listener"

on:
  issue_comment:
    types: [created]
  discussion_comment:
    types: [created]

permissions:
  issues: write
  discussions: write
  contents: write

jobs:
  dispatch:
    runs-on: ubuntu-latest
    if: >-
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association) &&
      !startsWith(github.event.comment.body, '✅') &&
      !startsWith(github.event.comment.body, '❌') &&
      github.event.comment.user.login != 'github-actions[bot]'
    steps:
      - name: Extract and sanitize command
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.comment.body || '';

            // Strip common prefixes (case-insensitive)
            let command = body
              .replace(/^[/@]?akari[:\s]*/i, '')
              .replace(/^阿卡丽[:\s，,]*/i, '')
              .trim();
            if (!command) command = body.trim();

            // JSON-safe: escape for embedding in client-payload
            const safeCommand = JSON.stringify(command);

            core.setOutput('command', command);
            core.setOutput('safe_command', safeCommand);
            core.setOutput('user', context.payload.comment.user.login);

            if (context.eventName === 'issue_comment') {
              core.setOutput('context_type', 'issue');
              core.setOutput('context_number', String(context.payload.issue.number));
            } else {
              core.setOutput('context_type', 'discussion');
              core.setOutput('context_number', String(context.payload.discussion.number));
            }

      - name: React to acknowledge
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes'
            });

      - name: Dispatch execution
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: 'akari-command',
              client_payload: {
                command: `${{ steps.parse.outputs.command }}`,
                user: `${{ steps.parse.outputs.user }}`,
                context_type: `${{ steps.parse.outputs.context_type }}`,
                context_number: `${{ steps.parse.outputs.context_number }}`,
                comment_id: String(context.payload.comment.id),
              },
            });
